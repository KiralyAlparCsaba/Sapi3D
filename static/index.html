<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Three.js Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; background: #222; }
    canvas { display: block; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/": "https://unpkg.com/three@0.160.0/"
    }
  }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { Metrics } from './metrics.js';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
import { PointerLockControls } from 'three/examples/jsm/controls/PointerLockControls.js';

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x222222);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.6, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);


const metrics = new Metrics(renderer);
// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(5, 10, 7.5);
scene.add(dirLight);

// Controls
const controls = new PointerLockControls(camera, document.body);
scene.add(controls.getObject());

// Movement
const move = { forward: false, backward: false, left: false, right: false };
const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();
const moveSpeed = 20.0;

// GLTF loading
const loader = new GLTFLoader();
let roofGroup = null;
let interiorGroup = null;
let triggerBox = null;
let isInside = false;


let modelLoaded = false;
let firstFrameWithModel = false;

performance.mark("model-start");

//loader.load('sapi3Dasynctrigger.glb', (gltf) => {
loader.load('sapi3Doriginal.glb', (gltf) => {
  const model = gltf.scene;
  scene.add(model);


  model.traverse((child) => {
    if (child.name === "Roof") roofGroup = child;
    if (child.name === "Interior") interiorGroup = child;
    if (child.name === "TriggerZone") {
      triggerBox = new THREE.Box3().setFromObject(child);
      child.visible = false;
    }
  });

  // Initial visibility
  if (roofGroup) roofGroup.visible = true;
  if (interiorGroup) interiorGroup.visible = false;

  modelLoaded = true;
}, undefined, (err) => {
  console.error('Error loading model:', err);
});


// Input
document.addEventListener('click', () => controls.lock());
document.addEventListener('keydown', (e) => {
  switch (e.code) {
    case 'KeyW': case 'ArrowUp': move.forward = true; break;
    case 'KeyS': case 'ArrowDown': move.backward = true; break;
    case 'KeyA': case 'ArrowLeft': move.left = true; break;
    case 'KeyD': case 'ArrowRight': move.right = true; break;
  }
});
document.addEventListener('keyup', (e) => {
  switch (e.code) {
    case 'KeyW': case 'ArrowUp': move.forward = false; break;
    case 'KeyS': case 'ArrowDown': move.backward = false; break;
    case 'KeyA': case 'ArrowLeft': move.left = false; break;
    case 'KeyD': case 'ArrowRight': move.right = false; break;
  }
});

// Trigger logic
function checkZoneTransition(position) {
  if (!triggerBox) return;
  const nowInside = triggerBox.containsPoint(position);

  if (nowInside !== isInside) {
    isInside = nowInside;
    if (roofGroup) roofGroup.visible = !isInside;
    if (interiorGroup) interiorGroup.visible = isInside;
  }
}

// Animate
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);

  metrics.begin();

  const delta = clock.getDelta();
  velocity.x -= velocity.x * 10.0 * delta;
  velocity.z -= velocity.z * 10.0 * delta;

  direction.z = Number(move.forward) - Number(move.backward);
  direction.x = Number(move.right) - Number(move.left);
  direction.normalize();

  if (move.forward || move.backward) velocity.z -= direction.z * moveSpeed * delta;
  if (move.left || move.right) velocity.x -= direction.x * moveSpeed * delta;

  const moveVector = new THREE.Vector3(velocity.x, 0, velocity.z).multiplyScalar(delta);
  controls.moveRight(-moveVector.x);
  controls.moveForward(-moveVector.z);

  checkZoneTransition(controls.getObject().position);

  renderer.render(scene, camera);

  if (modelLoaded && !firstFrameWithModel) {
    performance.mark("model-visible");
    performance.measure("Total load-to-visibility", "model-start", "model-visible");
    const entry = performance.getEntriesByName("Total load-to-visibility")[0];
    const loadTime = entry.duration.toFixed(2);

    console.log(`Model visible in scene after: ${loadTime} ms`);

    // Send to FastAPI backend
    fetch("/log_load_time", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ loadTime: loadTime })
    }).catch(err => console.error("Failed to send load time:", err));

    firstFrameWithModel = true;
}

  metrics.end();
}
animate();
</script>
</body>
</html>
