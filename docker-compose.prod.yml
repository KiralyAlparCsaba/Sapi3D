# Production Docker Compose Configuration
# Usage: docker-compose -f docker-compose.deployment.yml up -d

services:
  db:
    image: postgres:16-alpine
    container_name: sapi3d-db-prod
    environment:
      # IMPORTANT: Override these with secure values in production
      # Use docker-compose -f docker-compose.deployment.yml --env-file .env.prod up -d
      POSTGRES_USER: ${POSTGRES_USER:-sapi3d}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_THIS_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sapi3d}
    # Do NOT expose database port in production for security
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - sapi3d-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sapi3d}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sapi3d-backend-prod
    ports:
      - "8000:8000"

    command:
      - "uvicorn"
      - "main:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--ws-ping-interval"
      - "10"
      - "--ws-ping-timeout"
      - "5"
    # Persist user-uploaded content across rebuilds/redeploys.
    # Without these volumes, avatars/event/location images are wiped on every
    # image rebuild while the DB still references them (SAPI-022).
    volumes:
      - uploads-avatars:/app/static/avatars
      - uploads-events:/app/static/events
      - uploads-locations:/app/static/locations
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-sapi3d}:${POSTGRES_PASSWORD:-CHANGE_THIS_PASSWORD}@db:5432/${POSTGRES_DB:-sapi3d}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      # Restrict CORS to the production domain (JSON list format).
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost"]}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sapi3d-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sapi3d-frontend-prod
    ports:
      - "80:80"
      # Uncomment for HTTPS
      # - "443:443"
    depends_on:
      - backend
    networks:
      - sapi3d-network
    restart: unless-stopped

networks:
  sapi3d-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  uploads-avatars:
    driver: local
  uploads-events:
    driver: local
  uploads-locations:
    driver: local
