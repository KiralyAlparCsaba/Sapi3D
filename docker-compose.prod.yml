# Production Docker Compose Configuration
# Usage: docker-compose -f docker-compose.deployment.yml up -d

services:
  db:
    image: postgres:16-alpine
    container_name: sapi3d-db-prod
    environment:
      # IMPORTANT: Override these with secure values in production
      # Use docker-compose -f docker-compose.deployment.yml --env-file .env.prod up -d
      POSTGRES_USER: ${POSTGRES_USER:-sapi3d}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_THIS_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sapi3d}
    # Do NOT expose database port in production for security
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - sapi3d-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sapi3d}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sapi3d-backend-prod
    ports:
      - "8000:8000"
    # No volume mounts in production - code is baked into the image
    # volumes:
    #   - ./backend/static:/app/static
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-sapi3d}:${POSTGRES_PASSWORD:-CHANGE_THIS_PASSWORD}@db:5432/${POSTGRES_DB:-sapi3d}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sapi3d-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sapi3d-frontend-prod
    ports:
      - "80:80"
      # Uncomment for HTTPS
      # - "443:443"
    depends_on:
      - backend
    networks:
      - sapi3d-network
    restart: unless-stopped


networks:
  sapi3d-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
