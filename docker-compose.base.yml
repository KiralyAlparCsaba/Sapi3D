# Docker Compose Base Configuration
# This file contains common configuration shared between dev and prod environments
# 
# Usage:
#   Development: docker compose -f docker-compose.base.yml -f docker-compose.dev.yml up
#   Production:  docker compose -f docker-compose.base.yml -f docker-compose.prod.yml up
#
# Guidelines:
#   - DO modify: ports, image versions, resource limits
#   - DO NOT modify: service names, network names (breaks overrides)
#   - Environment-specific config goes in dev/prod override files

services:
  # Database Service
  # This is identical across all environments
  db:
    image: postgres:16-alpine
    container_name: sapi3d-db
    environment:
      POSTGRES_USER: sapi3d
      POSTGRES_PASSWORD: sapi3d_password
      POSTGRES_DB: sapi3d
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - sapi3d-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sapi3d"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service (Base Configuration)
  # Override in dev/prod for environment-specific settings
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sapi3d-backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sapi3d-network

  # Frontend Service (Base Configuration)
  # Override in dev/prod for different build targets and commands
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sapi3d-frontend
    depends_on:
      - backend
    networks:
      - sapi3d-network

# Network Configuration
# Shared across all environments
networks:
  sapi3d-network:
    driver: bridge

# Volume Configuration
# Shared across all environments
volumes:
  postgres-data: